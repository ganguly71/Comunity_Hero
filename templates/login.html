{% extends "base.html" %}

{% block title %}Login - Community Hero{% endblock %}

{% block content %}
<canvas id="particles-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; pointer-events: none;"></canvas>

<!-- Dark transparent backdrop overlay to dim particles background -->
<div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, rgba(10, 14, 23, 0.5) 0%, rgba(4, 8, 16, 0.82) 100%); z-index: -2; pointer-events: none;"></div>

<!-- Ashok Chakra Overlay (Watermarked and dimmed to 0.18 opacity) -->
<div id="ashok-chakra-overlay" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(0deg); width: clamp(380px, 55vw, 520px); height: clamp(380px, 55vw, 520px); z-index: -2; pointer-events: none; opacity: 0.18; filter: drop-shadow(0 -12px 25px rgba(255, 119, 0, 0.45)) drop-shadow(0 0 20px rgba(255, 255, 255, 0.3)) drop-shadow(0 12px 25px rgba(18, 153, 7, 0.45)); transition: opacity 0.5s ease;">
    <svg id="chakra-svg" viewBox="0 0 200 200" width="100%" height="100%">
        <!-- Solid background circle to prevent transparency -->
        <circle cx="100" cy="100" r="90" fill="#ffffff" />
        <circle cx="100" cy="100" r="90" fill="none" stroke="#000080" stroke-width="6" />
        <circle cx="100" cy="100" r="82" fill="none" stroke="#000080" stroke-width="1.5" />
        <circle cx="100" cy="100" r="16" fill="none" stroke="#000080" stroke-width="4" />
        <circle cx="100" cy="100" r="6" fill="#000080" />
    </svg>
</div>

<!-- Left Decorative Side Art (Orange Theme) -->
<div class="side-decor left-decor" style="position: fixed; left: 8%; top: 50%; transform: translateY(-50%); z-index: -1; opacity: 0.22; filter: drop-shadow(0 0 25px rgba(255, 119, 0, 0.3)); pointer-events: none;">
    <svg width="190" height="190" viewBox="0 0 24 24" fill="none" stroke="#FF7700" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 22h20M3 22V10h3v12M6 22V4h5v12m0 6V7h4v15m0 0V9h4v13M19 22V13h2v9"/>
    </svg>
    <div style="color: #FF7700; font-family: var(--font-heading); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-top: 1rem; text-align: center;">Build the Nation</div>
</div>

<!-- Right Decorative Side Art (Green Theme) -->
<div class="side-decor right-decor" style="position: fixed; right: 8%; top: 50%; transform: translateY(-50%); z-index: -1; opacity: 0.22; filter: drop-shadow(0 0 25px rgba(18, 153, 7, 0.3)); pointer-events: none;">
    <svg width="190" height="190" viewBox="0 0 24 24" fill="none" stroke="#129907" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 11l2 2 4-4"/>
    </svg>
    <div style="color: #129907; font-family: var(--font-heading); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-top: 1rem; text-align: center;">Fix Your City</div>
</div>

<style>
    @media (max-width: 1024px) {
        .side-decor {
            display: none !important;
        }
    }
</style>


<div class="auth-wrapper" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; margin: 0 auto; padding: 2rem 1rem;">
    <div class="glass card-entrance" style="background: rgba(18,26,43,0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(0,242,254,0.2); border-radius: 24px; box-shadow: 0 0 60px rgba(0,242,254,0.05); padding: 3rem 2rem; max-width: 440px; width: 100%; opacity: 0; transform: translateY(30px); animation: slideUpFade 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-family: var(--font-heading); font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; text-shadow: 0 0 20px rgba(0, 242, 254, 0.15);">Welcome Back</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to resolve hyperlocal problems.</p>
        </div>
        
        <form method="POST" id="login-form" onsubmit="handleAuthSubmit(event, 'Signing in...')">
            <div class="form-group">
                <label for="username" style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Username</label>
                <input type="text" id="username" name="username" class="glass-input" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 2.25rem;">
                <label for="password" style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Password</label>
                <input type="password" id="password" name="password" class="glass-input" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="glow-btn" id="submit-btn" style="width: 100%; padding: 0.9rem; font-size: 1rem;">
                <span class="btn-text">Sign In</span>
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.75rem; font-size: 0.9rem;">
            <span style="color: var(--text-muted);">Don't have an account? </span>
            <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600; text-shadow: 0 0 10px rgba(0, 242, 254, 0.2); transition: var(--transition-smooth);" onmouseover="this.style.color='#4facfe'" onmouseout="this.style.color='var(--primary)'">Sign Up</a>
        </div>
    </div>
</div>

<style>
    @keyframes slideUpFade {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}

{% block scripts %}
<!-- Three.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Reusable Particles Script -->
<script src="{{ url_for('static', filename='js/particles.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (window.initParticles) {
            window.initParticles('particles-canvas');
        }
    });

    function handleAuthSubmit(event, loadingText) {
        const form = event.target;
        const btn = form.querySelector('#submit-btn');
        const textSpan = btn.querySelector('.btn-text');
        
        btn.disabled = true;
        btn.style.opacity = '0.7';
        btn.style.cursor = 'not-allowed';
        
        textSpan.innerHTML = `<svg class="animate-spin" style="margin-right: 8px; width: 16px; height: 16px; display: inline-block; vertical-align: text-bottom;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle><path d="M12 2v4"></path></svg>${loadingText}`;
        
        setTimeout(() => {
            form.submit();
        }, 100);
        
        event.preventDefault();
    }
</script>
<style>
    .animate-spin {
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
</style>
{% endblock %}
