{% extends "base.html" %}

{% block title %}Register - Community Hero{% endblock %}

{% block content %}
<canvas id="particles-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none;"></canvas>

<!-- Ashok Chakra Overlay -->
<div id="ashok-chakra-overlay" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(0deg); width: clamp(380px, 55vw, 520px); height: clamp(380px, 55vw, 520px); z-index: -1; pointer-events: none; opacity: 0.95; filter: drop-shadow(0 -12px 25px rgba(255, 119, 0, 0.65)) drop-shadow(0 0 20px rgba(255, 255, 255, 0.45)) drop-shadow(0 12px 25px rgba(18, 153, 7, 0.65)); transition: opacity 0.5s ease;">
    <svg id="chakra-svg" viewBox="0 0 200 200" width="100%" height="100%">
        <!-- Solid background circle to prevent transparency -->
        <circle cx="100" cy="100" r="90" fill="#ffffff" />
        <circle cx="100" cy="100" r="90" fill="none" stroke="#000080" stroke-width="6" />
        <circle cx="100" cy="100" r="82" fill="none" stroke="#000080" stroke-width="1.5" />
        <circle cx="100" cy="100" r="16" fill="none" stroke="#000080" stroke-width="4" />
        <circle cx="100" cy="100" r="6" fill="#000080" />
    </svg>
</div>


<div class="auth-wrapper" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; margin: 0 auto; padding: 2rem 1rem;">
    <div class="glass card-entrance" style="background: rgba(18,26,43,0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(0,242,254,0.2); border-radius: 24px; box-shadow: 0 0 60px rgba(0,242,254,0.05); padding: 3rem 2rem; max-width: 460px; width: 100%; opacity: 0; transform: translateY(30px); animation: slideUpFade 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-family: var(--font-heading); font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; text-shadow: 0 0 20px rgba(0, 242, 254, 0.15);">Join the Heroes</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Start improving your community today.</p>
        </div>
        
        <form method="POST" id="register-form" onsubmit="handleAuthSubmit(event, 'Creating Account...')">
            <div class="form-group">
                <label for="username" style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Username</label>
                <input type="text" id="username" name="username" class="glass-input" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="email" style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Email Address</label>
                <input type="email" id="email" name="email" class="glass-input" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="address" style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Home Address</label>
                <textarea id="address" name="address" class="glass-input" placeholder="Enter your full home address (e.g. MG Road, Bengaluru, Karnataka)" rows="2" style="resize: none;" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="password" style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Password</label>
                <input type="password" id="password" name="password" class="glass-input" placeholder="Create a password" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 2.25rem;">
                <label for="confirm_password" style="color: var(--text-muted); font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; display: block;">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="glass-input" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="glow-btn" id="submit-btn" style="width: 100%; padding: 0.9rem; font-size: 1rem;">
                <span class="btn-text">Create Account (+50 Pts)</span>
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.75rem; font-size: 0.9rem;">
            <span style="color: var(--text-muted);">Already have an account? </span>
            <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600; text-shadow: 0 0 10px rgba(0, 242, 254, 0.2); transition: var(--transition-smooth);" onmouseover="this.style.color='#4facfe'" onmouseout="this.style.color='var(--primary)'">Sign In</a>
        </div>
    </div>
</div>

<style>
    @keyframes slideUpFade {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}

{% block scripts %}
<!-- Three.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Reusable Particles Script -->
<script src="{{ url_for('static', filename='js/particles.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (window.initParticles) {
            window.initParticles('particles-canvas');
        }
    });

    function handleAuthSubmit(event, loadingText) {
        const form = event.target;
        const btn = form.querySelector('#submit-btn');
        const textSpan = btn.querySelector('.btn-text');
        
        btn.disabled = true;
        btn.style.opacity = '0.7';
        btn.style.cursor = 'not-allowed';
        
        textSpan.innerHTML = `<svg class="animate-spin" style="margin-right: 8px; width: 16px; height: 16px; display: inline-block; vertical-align: text-bottom;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle><path d="M12 2v4"></path></svg>${loadingText}`;
        
        setTimeout(() => {
            form.submit();
        }, 100);
        
        event.preventDefault();
    }
</script>
<style>
    .animate-spin {
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
</style>
{% endblock %}
