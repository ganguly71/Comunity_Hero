{% extends "base.html" %}

{% block title %}Register - Community Hero{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-family: var(--font-heading); font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;">Join the Heroes</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Start improving your community today.</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="address">Home Address</label>
                <textarea id="address" name="address" class="form-control" placeholder="Enter your full home address (e.g., MG Road, Bengaluru, Karnataka)" rows="2" required></textarea>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem;">Create Account (+50 Pts)</button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            <span style="color: var(--text-muted);">Already have an account? </span>
            <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
